<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Digital Clock – Multiple Time Zones</title><style>:root{--pine:#02464B;--green:#BEE600;--teal:#62C5AE;--white:#FFFFFF;--black:#010920;--gray:#40485C;}*{box-sizing:border-box;margin:0;padding:0;}body{background:var(--pine);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;}header{text-align:center;margin-bottom:40px;}h1{font-size:clamp(2rem,6vw,3.2rem);font-weight:900;color:var(--white);letter-spacing:-0.03em;line-height:1;}h1 span{color:var(--green);}.subtitle{margin-top:8px;font-size:0.95rem;color:var(--teal);font-weight:500;}.clocks-container{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;max-width:1200px;width:100%;}.clock-card{background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);border-radius:16px;padding:24px;text-align:center;transition:all 0.3s ease;}.clock-card:hover{background:rgba(255,255,255,0.12);border-color:var(--teal);transform:translateY(-4px);}.timezone-name{font-size:1.1rem;font-weight:700;color:var(--green);margin-bottom:12px;letter-spacing:0.05em;}.clock-display{font-size:clamp(2rem,5vw,3rem);font-weight:900;color:var(--white);font-family:'Courier New',monospace;letter-spacing:0.05em;margin-bottom:12px;text-shadow:0 0 20px rgba(190,230,0,0.3);}.clock-info{font-size:0.85rem;color:rgba(255,255,255,0.6);font-weight:500;}footer{margin-top:40px;text-align:center;color:rgba(255,255,255,0.45);font-size:0.85rem;}</style></head><body><header><h1>Digital <span>Clock</span></h1><div class="subtitle">Current time in different time zones</div></header><div class="clocks-container" id="clocksContainer"></div><footer><div>Updates every second</div></footer><script>const TIMEZONES=[{name:"Berlin (CET)",zone:"Europe/Berlin"},{name:"London (GMT)",zone:"Europe/London"},{name:"New York (EST)",zone:"America/New_York"},{name:"Los Angeles (PST)",zone:"America/Los_Angeles"},{name:"Tokyo (JST)",zone:"Asia/Tokyo"},{name:"Sydney (AEDT)",zone:"Australia/Sydney"},{name:"Dubai (GST)",zone:"Asia/Dubai"},{name:"São Paulo (BRT)",zone:"America/Sao_Paulo"}];function getTimeInTimezone(timezone){const formatter=new Intl.DateTimeFormat("en-US",{timeZone:timezone,hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false});return formatter.format(new Date());}function updateClocks(){const container=document.getElementById("clocksContainer");container.innerHTML="";TIMEZONES.forEach(({name,zone})=>{const time=getTimeInTimezone(zone);const card=document.createElement("div");card.className="clock-card";card.innerHTML=`<div class="timezone-name">${name}</div><div class="clock-display">${time}</div><div class="clock-info">${new Date().toLocaleDateString("de-DE")}</div>`;container.appendChild(card);});}updateClocks();setInterval(updateClocks,1000);</script></body></html>
