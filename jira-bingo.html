<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Jira Bingo – Seibert Solutions Training</title><style>:root{--pine:#02464B;--green:#BEE600;--teal:#62C5AE;--white:#FFFFFF;--black:#010920;--gray:#40485C;}*{box-sizing:border-box;margin:0;padding:0;}body{background:var(--pine);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;}header{text-align:center;margin-bottom:28px;}.logo{font-size:1.1rem;font-weight:800;color:var(--white);letter-spacing:-0.02em;margin-bottom:8px;opacity:0.7;}h1{font-size:clamp(2rem,6vw,3.2rem);font-weight:900;color:var(--white);letter-spacing:-0.03em;line-height:1;}h1 span{color:var(--green);}.subtitle{margin-top:8px;font-size:0.95rem;color:var(--teal);font-weight:500;}.grid-wrap{background:rgba(255,255,255,0.06);border-radius:16px;padding:16px;border:1px solid rgba(255,255,255,0.1);}.column-labels{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:6px;}.col-label{text-align:center;font-size:1.4rem;font-weight:900;color:var(--green);letter-spacing:0.05em;}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}.cell{width:clamp(64px,13vw,110px);height:clamp(64px,13vw,110px);background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:clamp(0.55rem,1.4vw,0.78rem);font-weight:600;color:var(--white);cursor:pointer;padding:6px;line-height:1.2;transition:background 0.15s ease,transform 0.1s ease,border-color 0.15s ease;user-select:none;}.cell:hover:not(.free){background:var(--teal);color:var(--black);border-color:var(--teal);transform:scale(1.04);}.cell.marked{background:var(--green);color:var(--black);border-color:var(--green);transform:scale(1.05);}.cell.free{background:var(--green);color:var(--black);border-color:var(--green);cursor:default;font-size:clamp(0.7rem,1.6vw,0.9rem);}footer{margin-top:24px;text-align:center;color:rgba(255,255,255,0.45);font-size:0.85rem;}.new-card-btn{margin-top:16px;background:transparent;border:1.5px solid rgba(255,255,255,0.3);color:var(--white);padding:8px 20px;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer;transition:background 0.15s,border-color 0.15s;}.new-card-btn:hover{background:rgba(255,255,255,0.1);border-color:var(--green);}</style></head><body><header><div class="logo">Seibert Solutions</div><h1>Jira <span>Bingo</span></h1><div class="subtitle">Markiere Begriffe, wenn sie im Training fallen</div></header><div class="grid-wrap"><div class="column-labels"><div class="col-label">J</div><div class="col-label">I</div><div class="col-label">R</div><div class="col-label">A</div><div class="col-label">!</div></div><div class="grid" id="grid"></div></div><footer><div>Klick = markieren &nbsp;·&nbsp; Ruf "Bingo!" im Chat wenn du fertig bist</div><button class="new-card-btn" onclick="buildCard()">Neue Karte mischen</button></footer><script>const TERMS=["Projekt","Vorgang","Workflow","Status","Priorität","Komponente","Version","Unteraufgabe","Verknüpfung","Bearbeiter","Epic","Sprint","Backlog","Aktive Sprints","Kanban-Board","JQL","Filter","Dashboard","Gadget","Suche","Stichwort","Kommentar","Anhang","Tastaturkürzel"];function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}function buildCard(){const grid=document.getElementById("grid");grid.innerHTML="";const terms=shuffle(TERMS);terms.splice(12,0,"FREE ⭐");terms.forEach((term)=>{const cell=document.createElement("div");cell.className="cell";cell.textContent=term;if(term==="FREE ⭐"){cell.classList.add("free","marked");}else{cell.addEventListener("click",()=>cell.classList.toggle("marked"));}grid.appendChild(cell);});}buildCard();</script></body></html>
